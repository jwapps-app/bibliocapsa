services:

  bibliocapsa:
    build: .
    container_name: bibliocapsa
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Read-WRITE so the gated "Sync to Calibre" (calibredb) can write. The app's
      # own SQLite connections still open with mode=ro, so normal operation cannot
      # write — only the deliberate, confirmed sync does.
      - ${CALIBRE_LIBRARY_PATH}:/calibre
      - bibliocapsa_covers:/app/cover_cache
      - bibliocapsa_uploads:/app/uploads
      - bibliocapsa_webdav:/app/webdav
    environment:
      CALIBRE_DB_PATH: /calibre/metadata.db
      CALIBRE_LIBRARY_PATH: /calibre
      CALIBRE_FTS_DB_PATH: /calibre/full-text-search.db
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: bibliocapsa
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bibliocapsa}"
      POSTGRES_DB: bibliocapsa
      # "auto" (default) marks the session cookie Secure only when the request
      # arrived over HTTPS — so IP/HTTP users aren't locked out, while HTTPS users
      # still get a Secure cookie. Force with "true"/"false" if you must.
      COOKIE_SECURE: "${COOKIE_SECURE:-auto}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: bibliocapsa-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://bibliocapsa:8000"
      NODE_ENV: production
    depends_on:
      bibliocapsa:
        condition: service_healthy

  # Single front door: path-routes API/OPDS/WebDAV/KOSync → backend, everything
  # else → web UI. Exposes ONE port, so Cloudflare (or any proxy) needs just one
  # route to bibliocapsa, and WebDAV verbs pass through correctly.
  proxy:
    image: caddy:2-alpine
    container_name: bibliocapsa-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8090}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - bibliocapsa_caddy:/data
    depends_on:
      - bibliocapsa
      - web

  db:
    image: postgres:16-alpine
    container_name: bibliocapsa-db
    restart: unless-stopped
    volumes:
      - bibliocapsa_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: bibliocapsa
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bibliocapsa}"
      POSTGRES_DB: bibliocapsa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibliocapsa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NOTE: The KOReader sync server is now implemented natively in the FastAPI
  # backend (app/routers/kosync.py), backed by PostgreSQL. The old
  # koreader/kosync:latest image (a broken 2017 build) has been retired.
  # Point KOReader's "Custom sync server" at the Bibliocapsa base URL itself.

volumes:
  bibliocapsa_db:
  bibliocapsa_covers:
  bibliocapsa_uploads:
  bibliocapsa_webdav:
  bibliocapsa_caddy:
