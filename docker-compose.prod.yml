# Bibliocapsa — deploy compose. Fully self-contained: every service is a
# pre-built (public) image, so the only host path you provide is your Calibre
# library. Deploy via Portainer (paste this + set the env vars) or CLI:
#   docker compose -f docker-compose.prod.yml pull && up -d
#
# Required env:  CALIBRE_LIBRARY_PATH, POSTGRES_PASSWORD, DATA_PATH
#   DATA_PATH = host folder for app data (e.g. /volume1/docker/bibliocapsa) —
#               db/covers/uploads/webdav/caddy land in subfolders there (visible,
#               backup-able). The backend fixes their ownership itself.
# Optional env: VERSION (default "latest"), GHCR_USER (default "jwapps-app" —
#               only set this if running your own fork's images).
services:

  bibliocapsa:
    image: ghcr.io/${GHCR_USER:-jwapps-app}/bibliocapsa-backend:${VERSION:-latest}
    container_name: bibliocapsa
    restart: unless-stopped
    # No published port: the backend is reached only by the proxy and web
    # containers over the internal Docker network (as `bibliocapsa:8000`). This
    # keeps the API off the host so it can't be hit directly (bypassing the proxy
    # or spoofing X-Forwarded-Proto). Expose it only for debugging, and then bind
    # to loopback: `127.0.0.1:8000:8000`.
    volumes:
      - ${CALIBRE_LIBRARY_PATH}:/calibre
      - ${DATA_PATH:-./data}/covers:/app/cover_cache
      - ${DATA_PATH:-./data}/uploads:/app/uploads
      - ${DATA_PATH:-./data}/webdav:/app/webdav
    environment:
      CALIBRE_DB_PATH: /calibre/metadata.db
      CALIBRE_LIBRARY_PATH: /calibre
      CALIBRE_FTS_DB_PATH: /calibre/full-text-search.db
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: bibliocapsa
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: bibliocapsa
      COOKIE_SECURE: "${COOKIE_SECURE:-auto}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    image: ghcr.io/${GHCR_USER:-jwapps-app}/bibliocapsa-web:${VERSION:-latest}
    container_name: bibliocapsa-web
    restart: unless-stopped
    # No published port: the web UI is served through the proxy on PROXY_PORT.
    # The proxy reaches it as `web:3000` on the internal network.
    environment:
      NEXT_PUBLIC_API_URL: "http://bibliocapsa:8000"
      NODE_ENV: production
    depends_on:
      bibliocapsa:
        condition: service_healthy

  proxy:
    image: ghcr.io/${GHCR_USER:-jwapps-app}/bibliocapsa-proxy:${VERSION:-latest}
    container_name: bibliocapsa-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8090}:80"
    volumes:
      - ${DATA_PATH:-./data}/caddy:/data
    depends_on:
      - bibliocapsa
      - web

  db:
    image: postgres:16-alpine
    container_name: bibliocapsa-db
    restart: unless-stopped
    volumes:
      - ${DATA_PATH:-./data}/db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: bibliocapsa
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: bibliocapsa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibliocapsa"]
      interval: 10s
      timeout: 5s
      retries: 5
